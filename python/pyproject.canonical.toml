# ─────────────────────────────────────────────────────────────────────────────
# astrojones canonical pyproject.toml — SINGLE SOURCE OF TRUTH
#
# This file is the org standard for Python tooling (ruff, ty, pytest, coverage,
# build, dev deps). It is consumed by:
#   - the `pyproject-canon` skill (renders new/upgraded pyproject.toml from this)
#   - `/new-app` (deploy plugin) when scaffolding a Python backend
#   - any project that wants to align: regenerate, don't hand-edit tooling drift
#
# Edit the standard HERE, nowhere else. `{{ … }}` are render-time placeholders;
# `# VARIANT: …` marks the axes that legitimately vary per project (see
# variants.md). Everything unmarked is non-negotiable — apply without asking.
# ─────────────────────────────────────────────────────────────────────────────

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "{{ project_name }}"
version = "0.1.0"
description = "{{ description }}"
readme = "README.md"
requires-python = ">={{ python_version }}"   # VARIANT: 3.11 / 3.12 / 3.13 / 3.14
license = { text = "MIT" }
authors = [
    { name = "Jona Heidsick", email = "jona.heidsick@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    # VARIANT(api): "fastapi>=0.115", "uvicorn>=0.34", "httpx>=0.28"
    # VARIANT(mcp): "fastmcp>=3.0", "mcp>=1.20"
    # VARIANT(cli): "typer>=0.15", "rich>=13.0"
]

# Optional extras = runtime variants (consumers opt in).
# Dev tooling lives in [dependency-groups] (PEP 735) so `uv sync` installs it
# without leaking to downstream consumers.
[project.optional-dependencies]
api = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "httpx>=0.28",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.9",
    "ty>=0.0.29",
    "pre-commit>=4.0",
    # VARIANT(http-tests): "respx>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["src/{{ package_name }}"]

# VARIANT(workspace): replace [tool.hatch.*] with:
# [tool.uv.workspace]
# members = ["packages/*"]
# [tool.uv.sources]
# pkg-a = { workspace = true }
# pkg-b = { workspace = true }

# ---------------------------------------------------------------------------
# Ruff — strict by default. Every rule below has caught a real bug or
# merge-blocking style drift in production code.
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 120                 # VARIANT: 100 for lean projects, 120 default
target-version = "{{ ruff_target }}"   # py311 / py312 / py313 / py314
src = ["src", "tests"]
exclude = [".git", ".venv", "build", "dist", "__pycache__"]

[tool.ruff.lint]
preview = true
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "TID",    # flake8-tidy-imports — bans relative imports below
    "TCH",    # flake8-type-checking
    "BLE",    # blind-except
    "TRY",    # tryceratops — exception antipatterns
    "EM",     # flake8-errmsg — error messages on their own line
    "RSE",    # flake8-raise
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "A",      # flake8-builtins shadowing
    "C4",     # flake8-comprehensions
    "C901",   # mccabe complexity
    "SIM",    # flake8-simplify
    "RUF",    # ruff-specific rules
    "PL",     # pylint
    "PIE",    # flake8-pie
    "PERF",   # perflint
    "FURB",   # refurb
    "RET",    # flake8-return
    "DTZ",    # flake8-datetimez — ban naive datetimes
    "ANN401", # ban `Any` in annotations (Pydantic-everywhere policy)
    "FIX",    # flake8-fixme — flag TODO/FIXME so they don't rot
    "ERA",    # eradicate — no commented-out code
    "T10",    # flake8-debugger — no breakpoints
    "PTH",    # flake8-use-pathlib
    "LOG",    # flake8-logging
    "G",      # flake8-logging-format
    "PT",     # flake8-pytest-style
    "D",      # pydocstyle
    "S",      # flake8-bandit — security
    "FLY",    # flynt — prefer f-strings
    "ARG",    # flake8-unused-arguments
    "PGH003", # ban blanket `type: ignore`
    "PGH004", # require specific noqa codes
    # VARIANT(api): add "FAST" — fastapi best practices
]
ignore = [
    "PLC0415", # import-outside-top-level — needed for circular-import workarounds, lazy loading
    "RUF100",  # unused-noqa — false positives across plugin versions
]

# Pydantic-everywhere policy (enforced by review, supported by lint):
#   - No `dict`, `list[dict]`, or `Any` crossing public function boundaries.
#   - Construct Pydantic models at the call site; pass them, not unpacked kwargs.
#   - ANN401 above blocks `Any`. The rest is enforced in code review and ty.

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-positional-args = 5
max-statements = 50
max-branches = 12
max-returns = 6
max-nested-blocks = 5

[tool.ruff.lint.per-file-ignores]
# Tests get to be pragmatic: asserts, magic numbers, non-public docstrings,
# and security-style checks that make no sense for fixtures.
"tests/**/*.py" = [
    "S101",    # assert
    "TID251",  # banned-api in tests
    "PLR2004", # magic numbers in test data
    "PLR6301", # method could be a function — fixtures don't need self
    "D100",    # missing module docstring
    "D102",    # missing class/method docstring
    "D103",    # missing function docstring
    "D104",    # missing package docstring
    "S",       # bandit broad
    "ARG",     # unused fixtures look like unused args
    "ERA001",  # commented-out test cases
    "PLC",     # pylint convention — too noisy in tests
    "SIM",     # simplify — readability of tests > brevity
    "TRY",     # tryceratops — tests inspect raises directly
    "RET",     # return style
    "RUF029",  # async test funcs without await
    "PT",      # pytest-style — when intentional
]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.flake8-pytest-style]
# Force `pytest.raises(..., match=...)` for these — bare raises hide regressions.
raises-extend-require-match-for = [
    "pydantic.ValidationError",
    "pydantic_core._pydantic_core.ValidationError",
    "AttributeError",
    "FileNotFoundError",
    "asyncio.CancelledError",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

# ---------------------------------------------------------------------------
# ty — fast strict type checker (replaces mypy). Pre-1.0 but actively
# developed by Astral; pinned in dev group so version drift is explicit.
# ---------------------------------------------------------------------------
[tool.ty.rules]
unresolved-import = "error"
unresolved-reference = "error"
invalid-assignment = "error"
# VARIANT(loose): when wrapping libraries with dynamic attrs (discord.py cogs,
# pydantic-settings env loading), downgrade these to "warn":
# possibly-missing-attribute = "ignore"
# unused-ignore-comment = "ignore"
# invalid-argument-type = "ignore"
# unresolved-attribute = "warn"
# missing-argument = "warn"

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--strict-markers",
    "--cov=src",
    "--cov-report=term-missing",
    # VARIANT(html-cov): "--cov-report=html",
    # VARIANT(parallel): "-n", "auto", "--dist", "loadfile",
]
filterwarnings = ["error::DeprecationWarning"]
# VARIANT(strict-warnings): replace with:
# filterwarnings = [
#     "error",
#     "ignore::ResourceWarning",
#     "ignore::pytest.PytestUnraisableExceptionWarning",
# ]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*", "*/migrations/*"]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
